<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Gestión de Pendientes</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestión de Pendientes 🏢</h1>
            <p>Control de Actividades y Copropiedades</p>
        </header>
        <main>
            <div id="property-nav">
                <label for="current-property">📍 Propiedad:</label>
                <select id="current-property">
                    <option value="">Cargando...</option>
                </select>
                <button id="add-property-btn" title="Añadir nueva propiedad">+</button>
            </div>

            <div id="task-form">
                <input type="text" id="task-title" placeholder="Actividad...">
                <input type="text" id="task-desc" placeholder="Descripción/Notas...">
                <select id="task-priority">
                    <option value="baja">Baja</option>
                    <option value="media">Media</option>
                    <option value="alta">Alta</option>
                </select>
                <button id="add-btn">Añadir</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Actividad</th>
                            <th>Descripción</th>
                            <th>Prioridad</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="task-list">
                        <!-- Aquí se cargarán las filas de tareas -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal de Edición -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Editar Actividad</h3>
            <div class="form-group">
                <label>Nombre de la actividad:</label>
                <input type="text" id="edit-title">
            </div>
            <div class="form-group">
                <label>Descripción:</label>
                <textarea id="edit-desc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Prioridad:</label>
                <select id="edit-priority">
                    <option value="baja">Baja</option>
                    <option value="media">Media</option>
                    <option value="alta">Alta</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="cancel-edit" class="btn-secondary">Cancelar</button>
                <button id="save-edit" class="btn-primary">Guardar Cambios</button>
            </div>
        </div>
    </div>
    <script src="app.js" type="module"></script>
</body>
</html>
